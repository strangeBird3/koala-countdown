<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>悠里衣 ✈️🇺🇸 🌸</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(180deg, #0f0c29 0%, #302b63 40%, #24243e 70%, #1a1a2e 85%, #2d2d44 100%);
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
            overflow: hidden;
            position: relative;
        }

        /* Decorative Fairy Lights Effect */
        body::before {
            content: "⭐ 🌙 ✨ ⭐ 🌊 ⭐ ✨ 🌙 ⭐";
            position: absolute;
            top: 15px;
            font-size: 1.5rem;
            letter-spacing: 0.5rem;
            opacity: 0.8;
            width: 100%;
            text-align: center;
            z-index: 5;
        }

        /* Cute Anime Koala */
        .anime-koala {
            position: absolute;
            bottom: 12%;
            left: 8%;
            font-size: 9rem;
            line-height: 1;
            filter: drop-shadow(0px 8px 16px rgba(0,0,0,0.15));
            transform: rotate(-5deg);
            user-select: none;
            z-index: 1;
            animation: gentleSway 4s infinite ease-in-out;
        }

        /* Cute Anime Deer */
        .anime-deer {
            position: absolute;
            bottom: 5%;
            right: 8%;
            font-size: 9rem;
            line-height: 1;
            filter: drop-shadow(0px 8px 16px rgba(0,0,0,0.15));
            user-select: none;
            z-index: 1;
            animation: gentleBounce 3.5s infinite ease-in-out;
        }

        /* Main Glass-morphic Panel */
        #countdown-wrapper {
            background: rgba(255, 255, 255, 0.82);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 3px solid #ffffff;
            border-radius: 24px;
            padding: 2.5rem 2rem;
            box-shadow: 0 16px 36px rgba(0, 0, 0, 0.12);
            max-width: 500px;
            width: 100%;
            z-index: 10;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 1.8rem;
            color: #4a5568;
            text-shadow: 1px 1px 0px #fff;
        }

        .countdown-container {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .time-box {
            background: rgba(44, 62, 80, 0.9);
            border: 2px solid #ffffff;
            border-radius: 16px;
            padding: 1.2rem;
            min-width: 110px;
            flex: 1;
            box-shadow: inset 0 2px 6px rgba(255,255,255,0.2), 0 8px 16px rgba(0,0,0,0.1);
        }

        .number {
            font-size: 2.8rem;
            font-weight: 800;
            color: #81d4fa;
            line-height: 1;
            margin-bottom: 0.4rem;
            text-shadow: 0 0 10px rgba(129, 212, 250, 0.7);
        }

        .label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #e0f7fa;
            font-weight: 700;
        }

        .flight-info {
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(255, 255, 255, 0.3);
        }

        .flight {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.6rem 0;
            font-size: 0.9rem;
            color: #4a5568;
        }

        .flight .route {
            font-weight: 800;
        }

        .flight .date {
            color: #718096;
        }

        .flight .time {
            font-weight: 700;
            color: #2d3748;
        }

        #message {
            font-size: 2.5rem;
            font-weight: 800;
            color: #2e7d32;
            background: rgba(255, 255, 255, 0.92);
            padding: 2.5rem;
            border-radius: 24px;
            border: 4px solid #81c784;
            box-shadow: 0 12px 32px rgba(0,0,0,0.15);
            display: none;
            z-index: 10;
        }

        /* Fireflies */
        .sparkle {
            position: absolute;
            background: #ffeb3b;
            border-radius: 50%;
            z-index: 2;
            box-shadow: 0 0 10px 4px rgba(255, 235, 59, 0.8), 0 0 20px 8px rgba(255, 235, 59, 0.4);
            animation: fireflyFloat 8s infinite ease-in-out, fireflyGlow 2s infinite ease-in-out;
        }

        @keyframes fireflyFloat {
            0% { transform: translate(0, 0); }
            25% { transform: translate(30px, -40px); }
            50% { transform: translate(-20px, -20px); }
            75% { transform: translate(40px, 10px); }
            100% { transform: translate(0, 0); }
        }

        @keyframes fireflyGlow {
            0%, 100% { opacity: 0.2; box-shadow: 0 0 5px 2px rgba(255, 235, 59, 0.4); }
            50% { opacity: 1; box-shadow: 0 0 15px 6px rgba(255, 235, 59, 0.9), 0 0 30px 12px rgba(255, 235, 59, 0.5); }
        }

        @keyframes gentleSway {
            0%, 100% { transform: rotate(-5deg) translateY(0); }
            50% { transform: rotate(-2deg) translateY(-6px); }
        }

        @keyframes gentleBounce {
            0%, 100% { transform: translateY(0) scaleX(1); }
            50% { transform: translateY(-8px) scaleX(1.02); }
        }

        @media (max-width: 768px) {
            .anime-koala, .anime-deer { font-size: 5.5rem; bottom: 4%; }
            .anime-koala { left: 4%; }
            .anime-deer { right: 4%; }
            #countdown-wrapper { max-width: 90%; margin-bottom: 80px; }
        }

        @media (max-width: 480px) {
            h1 { font-size: 1.6rem; }
            .number { font-size: 2.2rem; }
            .time-box { min-width: 85px; padding: 0.8rem; }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@800&display=swap" rel="stylesheet">
</head>
<body>

    <div class="sparkle" style="width: 6px; height: 6px; left: 10%; top: 20%; animation-delay: 0s, 0s;"></div>
    <div class="sparkle" style="width: 5px; height: 5px; left: 25%; top: 60%; animation-delay: 1s, 0.5s;"></div>
    <div class="sparkle" style="width: 7px; height: 7px; left: 75%; top: 30%; animation-delay: 2s, 1s;"></div>
    <div class="sparkle" style="width: 4px; height: 4px; left: 85%; top: 70%; animation-delay: 0.5s, 1.5s;"></div>
    <div class="sparkle" style="width: 6px; height: 6px; left: 50%; top: 15%; animation-delay: 3s, 0.3s;"></div>
    <div class="sparkle" style="width: 5px; height: 5px; left: 5%; top: 80%; animation-delay: 1.5s, 0.8s;"></div>
    <div class="sparkle" style="width: 7px; height: 7px; left: 92%; top: 45%; animation-delay: 2.5s, 1.2s;"></div>

    <div class="anime-koala">🐨</div>
    <div class="anime-deer">🦌</div>

    <div id="countdown-wrapper">
        <h1>悠里衣 ✈️🇺🇸 ✨</h1>
        <div class="countdown-container">
            <div class="time-box">
                <div class="number" id="days">00</div>
                <div class="label">Days</div>
            </div>
            <div class="time-box">
                <div class="number" id="hours">00</div>
                <div class="label">Hours</div>
            </div>
            <div class="time-box">
                <div class="number" id="seconds">00</div>
                <div class="label">Seconds</div>
            </div>
        </div>
        <div class="flight-info">
            <div class="flight">
                <span class="route">🛫 HND → EWR</span>
                <span class="date">Tue, Aug 11</span>
                <span class="time">18:05 → 20:48</span>
            </div>
            <div class="flight">
                <span class="route">🛬 EWR → HND</span>
                <span class="date">Mon, Aug 31</span>
                <span class="time">09:00 → 15:40 +1</span>
            </div>
        </div>
    </div>

    <div id="message">おめでとう! The day has arrived! 🎉🐨🦌</div>

    <script>
        function updateCountdown() {
            const currentYear = new Date().getFullYear();
            let targetDate = new Date(`August 11, ${currentYear} 00:00:00`);
            const now = new Date();

            if (now > targetDate) {
                targetDate = new Date(`August 11, ${currentYear + 1} 00:00:00`);
            }

            const difference = targetDate - now;

            if (difference <= 0) {
                document.getElementById('countdown-wrapper').style.display = 'none';
                document.getElementById('message').style.display = 'block';
                clearInterval(countdownInterval);
                return;
            }

            const d = Math.floor(difference / (1000 * 60 * 60 * 24));
            const h = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const s = Math.floor((difference % (1000 * 60)) / 1000);

            document.getElementById('days').innerText = d.toString().padStart(2, '0');
            document.getElementById('hours').innerText = h.toString().padStart(2, '0');
            document.getElementById('seconds').innerText = s.toString().padStart(2, '0');
        }

        updateCountdown();
        const countdownInterval = setInterval(updateCountdown, 1000);
    </script>
</body>
</html>
